<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taco Cloud</title>
</head>
<body>
<form method="POST" th:action="@{/orders}" th:object="${tacoOrder}">
    <h1>Order your taco creations!</h1>
    <img th:src="@{/images/buildATaco.jpg}" width="500px"/>
    <a th:href="@{/design}" id="another">Design another taco</a><br/>
    <h3>Deliver my taco masterpieces to...</h3>
    <label for="deliveryName">Name: </label>
    <input type="text" th:field="*{deliveryName}"/>
    <span th:if="${#fields.hasErrors('deliveryName')}"
          th:errors="*{deliveryName}">deliveryName Error </span>
    <br/>
    <label for="deliveryStreet">Street address: </label>
    <input type="text" th:field="*{deliveryStreet}"/>
    <span th:if="${#fields.hasErrors('deliveryStreet')}"
          th:errors="*{deliveryStreet}">deliveryStreet Error </span>
    <br/>
    <label for="deliveryCity">City: </label>
    <input type="text" th:field="*{deliveryCity}"/>
    <span th:if="${#fields.hasErrors('deliveryCity')}"
          th:errors="*{deliveryCity}">deliveryName Error </span>
    <br/>
    <label for="deliveryState">State: </label>
    <input type="text" th:field="*{deliveryState}"/>
    <span th:if="${#fields.hasErrors('deliveryState')}"
          th:errors="*{deliveryState}">deliveryState Error </span>
    <br/>
    <label for="deliveryZip">Zip code: </label>
    <input type="text" th:field="*{deliveryZip}"/>
    <span th:if="${#fields.hasErrors('deliveryZip')}"
          th:errors="*{deliveryZip}">deliveryZip Error </span>
    <br/>
    <h3>Here's how I'll pay...</h3>
    <label for="ccNumber">Credit Card #: </label>
    <input type="text" th:field="*{ccNumber}"/>
    <span th:if="${#fields.hasErrors('ccNumber')}"
          th:errors="*{ccNumber}">CC Num Error </span>

    <!-- th:if decides if to display the span-->

    <!--    *
    the ${x} means you call a variable that is named x in the model
    Variable Expressions: ${...}
    Selection Variable Expressions: *{...} or input
    Message Expressions: #{...}
    Link URL Expressions: @{...}-->
    <br/>
    <label for="ccExpiration">Expiration: </label>
    <input type="text" th:field="*{ccExpiration}"/>
    <span th:if="${#fields.hasErrors('ccExpiration')}"
          th:errors="*{ccExpiration}">ccExpiration Error </span>
    <br/>
    <label for="ccCVV">CVV: </label>
    <input type="text" th:field="*{ccCVV}"/>
    <span th:if="${#fields.hasErrors('ccCVV')}"
          th:errors="*{ccCVV}">ccCVV Error </span>
    <br/>
    <input type="submit" value="Submit Order"/>
</form>
</body>
</html>
